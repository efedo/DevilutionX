syntax = "proto3";

package devilution.protocol.v1;

option csharp_namespace = "Devilution.Protocol.V1";

// The wire transport is intentionally outside this schema. The initial
// implementation uses TCP with a length-delimited Envelope payload.
message Envelope {
	oneof payload {
		ClientHello client_hello = 10;
		ServerHello server_hello = 11;
		CommandBatch command_batch = 20;
		CommandAck command_ack = 21;
		Snapshot snapshot = 30;
		EventBatch event_batch = 31;
		ProtocolError error = 40;
	}
}

message ClientHello {
	string client_build_id = 1;
	string protocol_schema_version = 2;
	string content_manifest_hash = 3;
	string resume_token = 4;
}

message ServerHello {
	string server_build_id = 1;
	string protocol_schema_version = 2;
	string content_manifest_hash = 3;
	uint32 tick_rate_hz = 4;
	string session_token = 5;
}

message CommandBatch {
	repeated Command commands = 1;
}

message Command {
	// Retried commands reuse this value. The server deduplicates by session and
	// client_sequence, then returns the original result for a duplicate.
	uint64 client_sequence = 1;
	uint64 requested_tick = 2;
	oneof intent {
		MoveRequested move_requested = 10;
		AttackRequested attack_requested = 11;
		CastRequested cast_requested = 12;
		OpenStoreRequested open_store_requested = 13;
		PurchaseRequested purchase_requested = 14;
		SellItemRequested sell_item_requested = 15;
		RepairItemRequested repair_item_requested = 16;
		RechargeItemRequested recharge_item_requested = 17;
		IdentifyItemRequested identify_item_requested = 18;
		MoveInventoryItemRequested move_inventory_item_requested = 19;
	}
}

message MoveRequested {
	int32 direction_x = 1;
	int32 direction_y = 2;
}

message AttackRequested {
	uint32 target_entity_id = 1;
}

message CastRequested {
	uint32 spell_id = 1;
	uint32 target_entity_id = 2;
	int32 target_x = 3;
	int32 target_y = 4;
}

message OpenStoreRequested {
	uint32 store_id = 1;
}

message PurchaseRequested {
	uint32 store_id = 1;
	uint32 store_slot = 2;
}

message SellItemRequested {
	uint32 inventory_index = 1;
}

message RepairItemRequested {
	uint32 inventory_index = 1;
}

message RechargeItemRequested {
	uint32 inventory_index = 1;
}

message IdentifyItemRequested {
	uint32 inventory_index = 1;
}

message MoveInventoryItemRequested {
	uint32 inventory_index = 1;
	uint32 target_cell = 2;
}

message CommandAck {
	repeated CommandResult results = 1;
}

message CommandResult {
	uint64 client_sequence = 1;
	uint64 server_receipt_sequence = 2;
	uint64 applied_tick = 3;
	CommandStatus status = 4;
	CommandRejectReason reject_reason = 5;
}

enum CommandStatus {
	COMMAND_STATUS_UNSPECIFIED = 0;
	COMMAND_STATUS_ACCEPTED = 1;
	COMMAND_STATUS_REJECTED = 2;
	COMMAND_STATUS_RESCHEDULED = 3;
	COMMAND_STATUS_DUPLICATE = 4;
}

enum CommandRejectReason {
	COMMAND_REJECT_REASON_UNSPECIFIED = 0;
	COMMAND_REJECT_REASON_MALFORMED = 1;
	COMMAND_REJECT_REASON_TOO_LATE = 2;
	COMMAND_REJECT_REASON_NOT_ALLOWED = 3;
	COMMAND_REJECT_REASON_INVALID_TARGET = 4;
	COMMAND_REJECT_REASON_INSUFFICIENT_RESOURCES = 5;
}

message Snapshot {
	uint64 tick = 1;
	string state_sha256 = 2;
	repeated PlayerSnapshot players = 3;
}

message PlayerSnapshot {
	uint32 entity_id = 1;
	int32 position_x = 2;
	int32 position_y = 3;
	int32 life = 4;
	int32 mana = 5;
	uint32 gold = 6;
	// Zero means that the player has no active store.
	uint32 active_store_id = 7;
	repeated ItemSnapshot inventory = 8;
	uint32 experience = 9;
	PlayerAttributesSnapshot attributes = 10;
	repeated EquippedItemSnapshot equipment = 11;
	repeated int32 inventory_grid = 12;
}

message ItemSnapshot {
	uint32 store_id = 1;
	uint32 store_slot = 2;
	uint32 item_seed = 3;
	uint32 price = 4;
	uint64 purchased_at_tick = 5;
	ItemStateSnapshot state = 6;
}

message ItemStateSnapshot {
	uint32 create_info = 1;
	int32 item_type = 2;
	int32 position_x = 3;
	int32 position_y = 4;
	bool deleted = 5;
	bool identified = 6;
	int32 magical = 7;
	int32 equip_location = 8;
	int32 item_class = 9;
	int32 value = 10;
	int32 identified_value = 11;
	int32 min_damage = 12;
	int32 max_damage = 13;
	int32 armor_class = 14;
	uint32 flags = 15;
	int32 misc_id = 16;
	int32 spell_id = 17;
	int32 item_index = 18;
	int32 charges = 19;
	int32 max_charges = 20;
	int32 durability = 21;
	int32 max_durability = 22;
	int32 plus_damage = 23;
	int32 plus_to_hit = 24;
	int32 plus_armor_class = 25;
	int32 plus_strength = 26;
	int32 plus_magic = 27;
	int32 plus_dexterity = 28;
	int32 plus_vitality = 29;
	int32 plus_fire_resistance = 30;
	int32 plus_lightning_resistance = 31;
	int32 plus_magic_resistance = 32;
	int32 plus_mana = 33;
	int32 plus_hit_points = 34;
	int32 plus_damage_modifier = 35;
	int32 plus_get_hit = 36;
	int32 plus_light = 37;
	int32 spell_level_add = 38;
	int32 unique_id = 39;
	int32 fire_min_damage = 40;
	int32 fire_max_damage = 41;
	int32 lightning_min_damage = 42;
	int32 lightning_max_damage = 43;
	int32 plus_enemy_armor_class = 44;
	int32 prefix_power = 45;
	int32 suffix_power = 46;
	int32 value_add_1 = 47;
	int32 value_multiply_1 = 48;
	int32 value_add_2 = 49;
	int32 value_multiply_2 = 50;
	int32 minimum_strength = 51;
	int32 minimum_magic = 52;
	int32 minimum_dexterity = 53;
	bool stat_flag = 54;
	int32 hellfire_damage_armor_flags = 55;
	uint32 buff = 56;
}

message PlayerAttributesSnapshot {
	AttributeSnapshot strength = 1;
	AttributeSnapshot magic = 2;
	AttributeSnapshot dexterity = 3;
	AttributeSnapshot vitality = 4;
}

message AttributeSnapshot {
	int32 base = 1;
	int32 current = 2;
}

message EquippedItemSnapshot {
	uint32 slot = 1;
	uint32 item_seed = 2;
	ItemStateSnapshot state = 3;
}

message EventBatch {
	uint64 tick = 1;
	repeated GameEvent events = 2;
}

message GameEvent {
	oneof event {
		DamageEvent damage = 10;
		ExperienceEvent experience = 11;
	}
}

message DamageEvent {
	uint32 source_entity_id = 1;
	uint32 target_entity_id = 2;
	int32 amount = 3;
}

message ExperienceEvent {
	uint32 player_entity_id = 1;
	uint32 amount = 2;
}

message ProtocolError {
	ProtocolErrorCode code = 1;
	string detail = 2;
}

enum ProtocolErrorCode {
	PROTOCOL_ERROR_CODE_UNSPECIFIED = 0;
	PROTOCOL_ERROR_CODE_UNSUPPORTED_SCHEMA = 1;
	PROTOCOL_ERROR_CODE_CONTENT_MISMATCH = 2;
	PROTOCOL_ERROR_CODE_NOT_AUTHENTICATED = 3;
	PROTOCOL_ERROR_CODE_INVALID_MESSAGE = 4;
}
